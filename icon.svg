<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background: rounded square, blue gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Box icon (open cardboard box) -->
  <!-- Back flap -->
  <path d="M148 170 L256 130 L364 170 L364 320 L256 360 L148 320 Z" fill="#ffffff" opacity="0.95"/>
  <!-- Box interior shadow -->
  <path d="M148 170 L256 210 L364 170 L364 180 L256 220 L148 180 Z" fill="#1e3a8a" opacity="0.3"/>
  <!-- Front face -->
  <path d="M148 180 L256 220 L256 360 L148 320 Z" fill="#e2e8f0"/>
  <!-- Side face -->
  <path d="M364 180 L256 220 L256 360 L364 320 Z" fill="#cbd5e1"/>
  <!-- Tape line on top -->
  <rect x="248" y="170" width="16" height="50" fill="#f59e0b" rx="2"/>

  <!-- Camera/scan icon (small, top-right corner) -->
  <circle cx="370" cy="120" r="42" fill="#16a34a"/>
  <rect x="348" y="108" width="44" height="30" rx="6" fill="#ffffff"/>
  <circle cx="370" cy="123" r="10" fill="#16a34a"/>
  <circle cx="370" cy="123" r="5" fill="#ffffff"/>

  <!-- Checkmark badge (bottom-right) -->
  <circle cx="360" cy="370" r="44" fill="#16a34a"/>
  <path d="M340 370 L355 385 L382 354" stroke="#ffffff" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
